<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mahakal Wellness — Billing Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --green-900:#132E26; --green-800:#1E4A3D; --green-700:#2A5C4C; --green-100:#DCE9E3;
    --gold-500:#D9A441; --gold-600:#B8842C; --gold-100:#F7E9C7;
    --surface:#FFFFFF; --bg:#F6F5F1; --ink-soft:#555; --ink-faint:#8A8A8A; --line:#E7E4DC;
    --danger:#C0392B; --danger-100:#FBE7E4; --ok:#2E7D4F; --ok-100:#E3F1E8;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:#222; -webkit-font-smoothing:antialiased;}
  h1,h2{font-family:'Fraunces',serif; margin:0;}

  .login-overlay{
    position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center;
    background:var(--green-900); padding:20px;
  }
  .login-card{
    background:var(--surface); border-radius:20px; padding:32px 26px; width:100%; max-width:360px;
    text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .login-card h2{font-size:20px; color:var(--green-800); margin-bottom:2px;}
  .hint{font-size:12.5px; color:var(--ink-faint); margin:0;}
  .field{margin-bottom:14px; text-align:left;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:4px;}
  .field input, .field select{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px;
    font-size:15px; font-family:inherit; background:#fff;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--green-700);}
  .login-error{color:var(--danger); font-size:12.5px; min-height:16px; margin:8px 0 4px;}
  .btn{
    border:none; border-radius:12px; padding:13px 18px; font-size:15px; font-weight:600;
    font-family:inherit; cursor:pointer; transition:transform .1s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-block{width:100%;}
  .btn-primary{background:var(--green-800); color:#fff;}
  .btn-gold{background:var(--gold-500); color:var(--green-900);}
  .btn-outline{background:#fff; border:1.5px solid var(--line); color:var(--green-800);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  #appRoot{display:none;}
  .topbar{background:var(--green-900); padding:14px 16px; display:flex; align-items:center; gap:12px;}
  .brand-mark{width:44px; height:44px; border-radius:50%; flex:none; background:#fff; overflow:hidden; box-shadow:0 0 0 2px var(--gold-500);}
  .brand-mark img{width:100%; height:100%; object-fit:cover;}
  .topbar h1{font-size:19px; font-weight:600; color:#fff; line-height:1.2;}
  .topbar .tagline{margin:1px 0 0; font-size:12px; color:var(--green-100); opacity:.85;}
  .header-link{background:none; border:none; color:var(--green-100); font-size:11px; text-decoration:underline; cursor:pointer; margin-left:auto;}

  main{padding:14px; max-width:640px; margin:0 auto; padding-bottom:110px;}
  .card{background:var(--surface); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .card h2{font-size:15px; color:var(--green-800); margin-bottom:10px; font-weight:600; font-family:'Inter',sans-serif;}
  .section-label{font-size:11px; font-weight:700; text-transform:uppercase; color:var(--ink-faint); letter-spacing:.4px; margin:0 0 8px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .search-wrap{position:relative;}
  .search-input{
    width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:12px;
    font-size:15px; font-family:inherit; background:#fff;
  }
  .search-input:focus{outline:none; border-color:var(--green-700);}
  .search-results{
    position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.15); max-height:280px; overflow-y:auto; z-index:20; display:none;
  }
  .search-results.show{display:block;}
  .result-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); cursor:pointer;}
  .result-row:last-child{border-bottom:none;}
  .result-row:hover, .result-row.kbd-active{background:var(--green-100);}
  .result-name{font-weight:600; font-size:14px;}
  .result-meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .result-price{font-weight:700; color:var(--green-800); font-size:14px;}
  .no-results{padding:14px; color:var(--ink-faint); font-size:13px; text-align:center;}

  .cart-header-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:10px;}
  .cart-header-row h2{margin-bottom:0;}
  .cart-header-totals{text-align:right; line-height:1.25; flex:none;}
  .cart-header-amt{font-family:'Fraunces',serif; font-size:16px; font-weight:700; color:var(--green-800);}
  .cart-header-sp{font-size:11.5px; font-weight:700; color:var(--gold-600);}
  .empty-cart{padding:20px; text-align:center; color:var(--ink-faint); font-size:13.5px;}
  .cart-item{border-bottom:1px solid var(--line); padding:12px 0;}
  .cart-item:last-child{border-bottom:none;}
  .cart-row-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .cart-name{font-weight:600; font-size:14.5px;}
  .cart-code{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .remove-btn{background:none; border:none; color:var(--danger); font-size:20px; line-height:1; cursor:pointer; padding:2px 6px;}
  .cart-row-bottom{display:flex; align-items:center; gap:12px; margin-top:8px;}
  .qty-stepper{display:flex; align-items:center; gap:6px;}
  .qty-stepper button{width:30px; height:30px; border-radius:8px; border:1.5px solid var(--line); background:#fff; font-size:16px; cursor:pointer;}
  .qty-stepper input{width:52px; text-align:center; padding:6px; border:1.5px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit;}
  .cart-amount{margin-left:auto; text-align:right;}
  .cart-amount .amt{font-weight:700; font-size:14.5px; color:var(--green-800);}
  .cart-amount .pts{font-size:11.5px; color:var(--gold-600); font-weight:600;}

  .summary-bar{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px;
    box-shadow:0 -2px 12px rgba(0,0,0,.08); z-index:40;
  }
  .summary-totals{line-height:1.15;}
  .grand-row{display:flex; align-items:baseline; gap:12px;}
  .grand{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--green-800);}
  .grand-sp{font-family:'Fraunces',serif; font-size:17px; font-weight:700; color:var(--gold-600);}
  .sub{font-size:11.5px; color:var(--ink-faint); font-weight:600;}

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--green-900); color:#fff;
    padding:10px 18px; border-radius:10px; font-size:13.5px; z-index:200; opacity:0; transition:opacity .2s ease;
    max-width:88%; text-align:center;
  }
  .toast.show{opacity:1;}
  .toast.error{background:var(--danger);}
</style>
</head>
<body>

  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <img src="" id="loginLogoImg" alt="Mahakal Wellness logo" style="width:76px;height:76px;border-radius:50%;margin:0 auto 12px;display:block;box-shadow:0 0 0 3px var(--gold-500);">
      <h2>Mahakal Wellness</h2>
      <p class="hint" style="margin-bottom:16px;">Sign in to continue</p>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="username" onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('loginPassword').focus();}">
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" onkeydown="if(event.key==='Enter'){event.preventDefault();attemptLogin();}">
      </div>
      <p class="login-error" id="loginError"></p>
      <button class="btn btn-primary btn-block" id="loginBtn" onclick="attemptLogin()">Log In</button>
    </div>
  </div>

  <div id="appRoot">
    <header class="topbar">
      <div class="brand-mark"><img src="" id="logoImg" alt="Mahakal Wellness logo"></div>
      <div>
        <h1>Mahakal Wellness</h1>
        <p class="tagline">Billing Counter</p>
      </div>
      <button class="header-link" onclick="logout()">Logout</button>
    </header>

    <main>
      <div class="card">
        <p class="section-label">Search &amp; add product</p>
        <div class="search-wrap">
          <input type="text" id="searchInput" class="search-input" placeholder="Product name or code…" autocomplete="off">
          <div id="searchResults" class="search-results"></div>
        </div>
        <p class="hint" id="productCountHint" style="margin-top:8px;">Loading products…</p>
      </div>

      <div class="card">
        <div class="cart-header-row">
          <h2 id="cartHeading">Bill items (0)</h2>
          <div class="cart-header-totals">
            <div class="cart-header-amt" id="cartHeaderAmt">₹0</div>
            <div class="cart-header-sp" id="cartHeaderSP">0 SP</div>
          </div>
        </div>
        <div id="cartList"><div class="empty-cart">Search above and tap a product to add it to this bill.</div></div>
      </div>

      <div class="card">
        <p class="section-label">Customer (optional)</p>
        <div class="field-row">
          <div class="field"><label for="custMobile">Mobile</label><input type="tel" id="custMobile" placeholder="10-digit number"></div>
          <div class="field"><label for="custName">Name</label><input type="text" id="custName" placeholder="Customer name"></div>
        </div>
      </div>

      <div class="card">
        <p class="section-label">Payment</p>
        <div class="field-row">
          <div class="field"><label for="payCash">Cash ₹</label><input type="number" id="payCash" placeholder="0" min="0" step="0.01"></div>
          <div class="field"><label for="payOnline">Online ₹</label><input type="number" id="payOnline" placeholder="0" min="0" step="0.01"></div>
        </div>
        <div class="field">
          <label for="salesman">Salesman</label>
          <input type="text" id="salesman" placeholder="Your name">
        </div>
      </div>
    </main>

    <div id="summaryBar" class="summary-bar">
      <div class="summary-totals">
        <div class="grand-row">
          <div class="grand" id="grandTotal">₹0</div>
          <div class="grand-sp" id="grandSP">0 SP</div>
        </div>
        <div class="sub" id="subTotals">0 qty</div>
      </div>
      <button class="btn btn-gold" id="saveBtn" onclick="saveBill()" disabled>Save Bill</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let PRODUCTS = [];
  let CART = [];
  let pendingProduct = null;

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(function () { t.className = 'toast'; }, 3000);
  }

  function money(n) { return '₹' + (Number(n) || 0).toLocaleString('en-IN', { maximumFractionDigits: 2 }); }
  function trimNum(n) { n = Number(n) || 0; return n % 1 === 0 ? String(n) : n.toFixed(2).replace(/0+$/, '').replace(/\.$/, ''); }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

  document.addEventListener('DOMContentLoaded', async function () {
    document.getElementById('logoImg').src = LOGO_DATA_URI;
    document.getElementById('loginLogoImg').src = LOGO_DATA_URI;

    const { data: { session } } = await sb.auth.getSession();
    if (session) { startApp(); } else { document.getElementById('loginOverlay').style.display = 'flex'; }

    document.getElementById('custMobile').addEventListener('blur', async function () {
      const mobile = this.value.trim();
      if (mobile.length < 6) return;
      const { data } = await sb.from('customers').select('name').eq('mobile', mobile).maybeSingle();
      if (data && data.name) document.getElementById('custName').value = data.name;
    });
  });

  async function attemptLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Enter both email and password.'; return; }
    btn.disabled = true; btn.textContent = 'Checking…';
    const { error } = await sb.auth.signInWithPassword({ email: email, password: password });
    btn.disabled = false; btn.textContent = 'Log In';
    if (error) { errEl.textContent = error.message; return; }
    document.getElementById('loginOverlay').style.display = 'none';
    startApp();
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  async function startApp() {
    document.getElementById('appRoot').style.display = 'block';
    await loadProducts();
    wireSearch();
  }

  async function loadProducts() {
    const { data, error } = await sb.from('products').select('*').neq('status', 'Inactive');
    if (error) { showToast('Could not load products: ' + error.message, true); return; }
    PRODUCTS = data || [];
    document.getElementById('productCountHint').textContent = PRODUCTS.length + ' products loaded.';
  }

  function rankProducts(query) {
    query = (query || '').trim().toLowerCase();
    if (!query) return [];
    const scored = [];
    PRODUCTS.forEach(function (p) {
      const code = String(p.code).toLowerCase();
      const name = String(p.name).toLowerCase();
      let tier = -1;
      if (code === query) tier = 0;
      else if (code.indexOf(query) === 0) tier = 1;
      else if (name.indexOf(query) === 0) tier = 2;
      else if (code.indexOf(query) > -1) tier = 3;
      else if (name.indexOf(query) > -1) tier = 4;
      if (tier > -1) scored.push({ p: p, tier: tier, codeLen: code.length });
    });
    scored.sort(function (a, b) { return a.tier !== b.tier ? a.tier - b.tier : a.codeLen - b.codeLen; });
    return scored.slice(0, 8).map(function (x) { return x.p; });
  }

  function wireSearch() {
    const input = document.getElementById('searchInput');
    const box = document.getElementById('searchResults');
    let currentMatches = [];
    let activeIdx = -1;

    function setActive(idx) {
      const rows = box.querySelectorAll('.result-row');
      activeIdx = idx;
      rows.forEach(function (r, i) { r.classList.toggle('kbd-active', i === idx); });
    }

    function refresh() {
      currentMatches = rankProducts(input.value);
      renderResults(currentMatches, box, setActive);
      setActive(currentMatches.length ? 0 : -1);
    }

    input.addEventListener('input', refresh);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowDown' && currentMatches.length) { e.preventDefault(); setActive(Math.min(activeIdx + 1, currentMatches.length - 1)); }
      else if (e.key === 'ArrowUp' && currentMatches.length) { e.preventDefault(); setActive(Math.max(activeIdx - 1, 0)); }
      else if (e.key === 'Enter' && currentMatches.length) { e.preventDefault(); promptQty(currentMatches[activeIdx > -1 ? activeIdx : 0]); }
    });
    document.addEventListener('click', function (e) {
      if (!box.contains(e.target) && e.target !== input) box.classList.remove('show');
    });
  }

  function renderResults(matches, box, setActive) {
    if (!matches.length) { box.classList.remove('show'); box.innerHTML = ''; return; }
    box.innerHTML = matches.map(function (p) {
      return '<div class="result-row" data-code="' + p.code + '">' +
        '<div><div class="result-name">' + escapeHtml(p.name) + '</div><div class="result-meta">#' + p.code + '</div></div>' +
        '<div class="result-price">' + money(p.dp) + '</div></div>';
    }).join('');
    box.classList.add('show');
    Array.from(box.querySelectorAll('.result-row')).forEach(function (row, idx) {
      row.addEventListener('click', function () {
        const p = PRODUCTS.find(function (x) { return String(x.code) === row.dataset.code; });
        if (p) promptQty(p);
      });
      row.addEventListener('mouseenter', function () { setActive(idx); });
    });
  }

  function promptQty(p) {
    const qty = Number(prompt('Qty for ' + p.name + '?', '1'));
    if (!(qty > 0)) return;
    const existing = CART.find(function (c) { return c.code === p.code; });
    if (existing) existing.qty += Math.round(qty);
    else CART.push({ code: p.code, name: p.name, dp: Number(p.dp), sp: Number(p.sp), qty: Math.round(qty) });
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').classList.remove('show');
    renderCart();
  }

  function renderCart() {
    const list = document.getElementById('cartList');
    document.getElementById('cartHeading').textContent = 'Bill items (' + CART.length + ')';
    if (!CART.length) {
      list.innerHTML = '<div class="empty-cart">Search above and tap a product to add it to this bill.</div>';
    } else {
      list.innerHTML = CART.map(function (c) {
        return '<div class="cart-item" data-code="' + c.code + '">' +
          '<div class="cart-row-top"><div><div class="cart-name">' + escapeHtml(c.name) + '</div><div class="cart-code">#' + c.code + ' · ' + money(c.dp) + ' each</div></div>' +
          '<button class="remove-btn" data-remove="' + c.code + '">&times;</button></div>' +
          '<div class="cart-row-bottom">' +
            '<div class="qty-stepper"><button data-delta="-1" data-code="' + c.code + '">&minus;</button>' +
            '<input type="number" class="qtyInput" data-code="' + c.code + '" min="1" step="1" value="' + c.qty + '">' +
            '<button data-delta="1" data-code="' + c.code + '">&plus;</button></div>' +
            '<div class="cart-amount"><div class="amt">' + money(c.qty * c.dp) + '</div><div class="pts">' + trimNum(c.qty * c.sp) + ' SP</div></div>' +
          '</div></div>';
      }).join('');
      Array.from(list.querySelectorAll('[data-remove]')).forEach(function (btn) {
        btn.addEventListener('click', function () { CART = CART.filter(function (c) { return c.code !== btn.dataset.remove; }); renderCart(); });
      });
      Array.from(list.querySelectorAll('[data-delta]')).forEach(function (btn) {
        btn.addEventListener('click', function () {
          const item = CART.find(function (c) { return c.code === btn.dataset.code; });
          item.qty = Math.max(1, item.qty + Number(btn.dataset.delta));
          renderCart();
        });
      });
      Array.from(list.querySelectorAll('.qtyInput')).forEach(function (input) {
        input.addEventListener('input', function () {
          const item = CART.find(function (c) { return c.code === input.dataset.code; });
          const v = Math.round(Number(input.value));
          item.qty = (isFinite(v) && v > 0) ? v : item.qty;
          renderCart();
        });
      });
    }
    renderTotals();
  }

  function renderTotals() {
    let qty = 0, amount = 0, sp = 0;
    CART.forEach(function (c) { qty += c.qty; amount += c.qty * c.dp; sp += c.qty * c.sp; });
    document.getElementById('cartHeaderAmt').textContent = money(amount);
    document.getElementById('cartHeaderSP').textContent = trimNum(sp) + ' SP';
    document.getElementById('grandTotal').textContent = money(amount);
    document.getElementById('grandSP').textContent = trimNum(sp) + ' SP';
    document.getElementById('subTotals').textContent = trimNum(qty) + ' qty';
    document.getElementById('saveBtn').disabled = CART.length === 0;
  }

  async function saveBill() {
    if (!CART.length) { showToast('Add at least one product first.', true); return; }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const cartSnapshot = CART.slice();
    const payload = {
      p_customer_name: document.getElementById('custName').value.trim(),
      p_mobile: document.getElementById('custMobile').value.trim(),
      p_customer_type: 'Retail',
      p_cash: Number(document.getElementById('payCash').value) || 0,
      p_online: Number(document.getElementById('payOnline').value) || 0,
      p_salesman: document.getElementById('salesman').value.trim(),
      p_remark: '',
      p_id_name: '', p_id_no: '', p_reference_name: '', p_reference_mobile: '',
      p_items: cartSnapshot.map(function (c) { return { code: c.code, name: c.name, qty: c.qty, dp: c.dp, sp: c.sp }; })
    };
    const { data: invoiceNo, error } = await sb.rpc('save_invoice', payload);
    btn.disabled = false; btn.textContent = 'Save Bill';
    if (error) { showToast('Could not save: ' + error.message, true); return; }

    await confirmDeliveryFlow(invoiceNo, cartSnapshot);

    showToast('Saved as ' + invoiceNo);
    CART = [];
    document.getElementById('custName').value = '';
    document.getElementById('custMobile').value = '';
    document.getElementById('payCash').value = '';
    document.getElementById('payOnline').value = '';
    renderCart();
    await loadProducts();
  }

  // Right after saving, ask how much of each item was actually delivered right now
  // (defaults to the full quantity) - this is what reduces Physical Stock, same as
  // the Apps Script version. If less than the full qty is entered, the rest stays
  // "pending" on the bill for a Delivery Update step we'll add later.
  async function confirmDeliveryFlow(invoiceNo, items) {
    const deliveryItems = items.map(function (c) {
      const enteredRaw = prompt('Delivered now: ' + c.name + ' (out of ' + c.qty + ')', String(c.qty));
      let delivered = Math.round(Number(enteredRaw));
      if (!isFinite(delivered) || delivered < 0) delivered = c.qty;
      if (delivered > c.qty) delivered = c.qty;
      return { code: c.code, delivered_qty: delivered };
    });
    const { error } = await sb.rpc('confirm_delivery', { p_invoice_no: invoiceNo, p_items: deliveryItems });
    if (error) showToast('Bill saved, but delivery update failed: ' + error.message, true);
  }
</script>
</body>
